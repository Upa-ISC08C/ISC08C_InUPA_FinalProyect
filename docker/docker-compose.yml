version: '3.8'

# Los valores sensibles NO van aqui: viven en el archivo .env de la raiz (no versionado).
# Ejecuta 'node scripts/setup-env.js' para generarlo a partir de docker/.env.example.

services:
  db:
    image: postgres:15
    container_name: inupa_db
    restart: always
    env_file:
      - ../.env
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.dev
    container_name: inupa_backend
    restart: always
    env_file:
      - ../.env
    environment:
      - DB_HOST=db # Sobrescribe localhost para usar el contenedor de la BD
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.dev
    container_name: inupa_frontend
    restart: always
    environment:
      - NODE_ENV=development
      # Carga el ID de Google desde el .env de la raiz (leido por compose)
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
