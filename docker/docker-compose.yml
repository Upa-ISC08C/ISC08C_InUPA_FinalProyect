version: '3.8'

# Los valores sensibles NO van aqui: viven en docker/.env (no versionado).
# Copia docker/.env.example a docker/.env y rellena tus valores reales.

services:
  db:
    image: postgres:15
    container_name: inupa_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.dev
    container_name: inupa_backend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.dev
    container_name: inupa_frontend
    restart: always
    environment:
      - NODE_ENV=development
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
