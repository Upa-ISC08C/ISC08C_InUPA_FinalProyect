name: QA Preview (Runner Windows)

# Levanta el entorno del PR en la maquina Windows (self-hosted runner) con Docker,
# para la revision visual (QA). Se activa cuando el PR recibe la etiqueta "qa".
#
# REQUISITO: self-hosted runner con labels [self-hosted, windows] y Docker Desktop corriendo.
# Los valores sensibles se inyectan desde el secret QA_ENV_FILE (contenido de docker/.env),
# porque docker/.env NO esta versionado.
#
# SEGURIDAD: un self-hosted runner ejecuta el codigo del PR en tu maquina. Usa esto solo
# con PRs del propio equipo, nunca con forks externos no confiables.

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, closed]
    branches: [develop, qa]

concurrency:
  group: qa-preview
  cancel-in-progress: false

jobs:
  levantar:
    name: Levantar entorno de QA
    if: >-
      github.event.pull_request.state == 'open' &&
      github.event.action != 'unlabeled' &&
      contains(github.event.pull_request.labels.*.name, 'qa')
    runs-on: [self-hosted, windows]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Generar docker/.env desde el secret
        env:
          QA_ENV_FILE: ${{ secrets.QA_ENV_FILE }}
        run: |
          [System.IO.File]::WriteAllText("$env:GITHUB_WORKSPACE\docker\.env", $env:QA_ENV_FILE, (New-Object System.Text.UTF8Encoding($false)))
      - name: Bajar entorno previo (si existe)
        run: docker compose -f docker/docker-compose.yml down -v
        continue-on-error: true
      - name: Construir y levantar
        run: docker compose -f docker/docker-compose.yml up -d --build
      - name: Publicar URLs de QA
        run: |
          "### Entorno de QA levantado en el Runner de Windows" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Frontend: http://localhost:5173" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Backend (health): http://localhost:3000/health" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "Quita la etiqueta 'qa' o cierra el PR para bajar el entorno." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  bajar:
    name: Bajar entorno de QA
    if: >-
      github.event.action == 'closed' ||
      github.event.action == 'unlabeled'
    runs-on: [self-hosted, windows]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Generar docker/.env desde el secret
        env:
          QA_ENV_FILE: ${{ secrets.QA_ENV_FILE }}
        run: |
          [System.IO.File]::WriteAllText("$env:GITHUB_WORKSPACE\docker\.env", $env:QA_ENV_FILE, (New-Object System.Text.UTF8Encoding($false)))
      - name: Bajar entorno
        run: docker compose -f docker/docker-compose.yml down -v
        continue-on-error: true
